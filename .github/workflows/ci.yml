name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt pytest
      - name: Run scoring engine tests
        run: python -m pytest backend/tests/ -v
      - name: Smoke-test API boot
        run: |
          cd backend
          python -m uvicorn main:app --port 9000 &
          sleep 5
          curl --fail http://localhost:9000/health
          curl --fail http://localhost:9000/profiles
          curl --fail -o /dev/null http://localhost:9000/profiles/mohammad/proof-of-income

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build both images
        run: docker compose build
