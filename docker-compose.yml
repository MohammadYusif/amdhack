services:
  backend:
    build: ./backend
    container_name: mihan-backend
    ports:
      - "9000:9000"
    env_file:
      # Holds the Wathq API credentials; without it the app silently
      # falls back to simulated Wathq data (demo still works).
      - path: backend/.env
        required: false
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Inlined into the browser bundle — must be the backend URL as seen
        # from the host machine's browser, not the Docker-internal hostname.
        NEXT_PUBLIC_API_URL: http://localhost:9000
    container_name: mihan-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
